# SmartFarm Backend - Docker Compose Configuration
# For local development and testing

version: '3.8'

services:
  # PHP-Apache Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartfarm-api
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=smartfarm
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=your-local-development-secret-key-min-32-chars
      - PHP_ENV=development
    volumes:
      - ./uploads:/var/www/html/uploads
      - ./logs:/var/www/html/logs
    depends_on:
      - db
    networks:
      - smartfarm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: smartfarm-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=smartfarm
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - smartfarm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin (Optional - Database Management UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: smartfarm-pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@smartfarm.com
      - PGADMIN_DEFAULT_PASSWORD=admin123
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - smartfarm-network
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:

networks:
  smartfarm-network:
    driver: bridge
