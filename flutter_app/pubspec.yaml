name: smartfarm
description: A comprehensive farming mobile application for Kenyan farmers

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP Client
  dio: ^5.4.0
  http: ^1.1.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Image Handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  image_cropper: ^5.0.1
  
  # UI Components
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  fluttertoast: ^8.2.4
  flutter_slidable: ^3.0.1
  pull_to_refresh: ^2.0.0
  
  # Forms & Validation
  formz: ^0.6.1
  
  # Date/Time
  intl: ^0.18.1
  
  # Charts
  fl_chart: ^0.66.0
  
  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  firebase_messaging: ^14.7.10
  
  # Environment Variables
  flutter_dotenv: ^5.1.0
  
  # JWT
  jwt_decoder: ^2.0.1
  
  # Path
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # Permission
  permission_handler: ^11.1.0
  
  # Connectivity
  connectivity_plus: ^5.0.2
  
  # URL Launcher
  url_launcher: ^6.2.2
  
  # Share
  share_plus: ^7.2.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  flutter_gen_runner: ^5.3.2

flutter:
  uses-material-design: true
  
  assets:
    - .env
    - assets/images/
    - assets/fonts/
    - assets/icons/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600

flutter_gen:
  output: lib/generated/
  line_length: 80
